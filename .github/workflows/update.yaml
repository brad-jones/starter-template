# NB: For this workflow to work with the built in GITHUB_TOKEN.
# You must tick "Allow GitHub Actions to create and approve pull requests".
# In the repository settings under Actions > General > Workflow permissions.
#
# Then you would also give the renovate job these permissions:
#
# ```yaml
# permissions:
#   issues: write
#   contents: write
#   pull-requests: write
# ```
#
# Assuming the above is all done, using the built in GITHUB_TOKEN is sufficient
# for Renovate to create pull requests that update anything but github actions
# themselves, if you want Renovate to update the version of the github actions
# used in this workflow files, you must obtain a token with the workflow scope.
# see: https://github.com/renovatebot/github-action#special-token-requirements-when-using-the-github-actions-manager
#
# There are at least 2 ways to do this:
# - One is to create a personal access token and add it as a secret in your repo,
# - The other is to create a GitHub App and use the actions/create-github-app-token
#
# In this repo we have setup a Github App called "brads-renovate[bot]"

on:
  workflow_dispatch:
  schedule:
    - cron: 0 0 * * *
  issues:
    types:
      - edited

env:
  # Set me to the issue number of the Renovate Dependency Dashboard issue
  RENOVATE_ISSUE_NUMBER: 13

  # Set me to the username of the Renovate bot,
  # so we can skip running this job when the Renovate
  # bot edits the dashboard issue.
  RENOVATE_BOT_USERNAME: brads-renovate[bot]

jobs:
  renovate:
    # NB: The `issues` trigger fires for every issue in the repo, but we only
    # want this job to re-run when the Renovate Dependency Dashboard issue changes.
    # We also skip when the change was made by RENOVATE_BOT_USERNAME itself
    # (i.e. by this very job editing the dashboard), to avoid a recursive loop.
    if: |
      (github.event_name != 'issues' || github.event.issue.number == env.RENOVATE_ISSUE_NUMBER)
      && github.event.sender.login != env.RENOVATE_BOT_USERNAME
    runs-on: ubuntu-latest
    steps:
      - name: 🔑 Authenticate as Github App
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ secrets.RENOVATE_CLIENT_ID }}
          private-key: ${{ secrets.RENOVATE_PRIVATE_KEY }}

      - name: ⬇️ Git Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: 🤖 Run Renovate
        uses: renovatebot/github-action@v46.1.19
        env:
          RENOVATE_TOKEN: ${{ steps.app-token.outputs.token }}
          RENOVATE_REPOSITORIES: ${{ github.repository }}

  pixi:
    if: github.event_name != 'issues'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: ⬇️ Git Checkout
        uses: actions/checkout@v6

      - name: ✨ Setup Pixi
        uses: prefix-dev/setup-pixi@v0.10.0
        with:
          run-install: false

      - name: Update lockfiles
        run: |
          set -o pipefail
          pixi update --json | pixi exec pixi-diff-to-markdown >> diff.md

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore(pixi): update pixi lockfile"
          title: "chore(pixi): update pixi lockfile"
          body-path: diff.md
          branch: update-pixi
          base: master
          labels: pixi
          delete-branch: true
          add-paths: pixi.lock
