on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: ⬇️ Git Checkout
        uses: actions/checkout@v6

      - name: ✨ Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: v0.69.0
          activate-environment: true

      - name: 🛠️ Additional Initialization
        run: task init
